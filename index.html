<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Andy Training</title>
    <style>
        body { margin: 0; background-color: red; color: yellow; font-family: Arial, sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; overflow: hidden; text-align: center; }
        #action { font-size: 12vw; font-weight: bold; }
        #timer { font-size: 25vw; font-weight: bold; }
        button { padding: 25px 35px; font-size: 22px; font-weight: bold; cursor: pointer; border: none; border-radius: 15px; background: white; color: red; margin: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.3); }
        #debug { position: absolute; bottom: 10px; font-size: 12px; color: white; width: 90%; word-wrap: break-word; }
    </style>
</head>
<body>
    <div id="action">ANDY TRAINING</div>
    <div id="timer">KLIK START</div>
    <div id="menu">
        <button onclick="startApp(false)">START MET SONG</button>
        <button onclick="startApp(true)">SNELSTART (20s)</button>
    </div>
    <div id="debug" id="status"></div>

    <script>
        // We proberen het bestand direct te laden omdat ze los in je lijst staan
        const sounds = {};
        const audioFiles = {
            intro: "naamloos.wav",
            start: "START.mp3",
            stop: "stop 0.555 sec.mp3",
            finish: "aftellen 1 naar 1.mp3"
        };

        function loadAll() {
            for (let key in audioFiles) {
                sounds[key] = new Audio(audioFiles[key]);
                sounds[key].onerror = () => document.getElementById('debug').innerText += " Fout: " + audioFiles[key];
            }
            for (let i = 2; i <= 10; i++) {
                let name = (i === 5) ? "aftellen5 naar 1.mp3" : `aftellen ${i} naar 1.mp3`;
                sounds[`count${i}`] = new Audio(name);
                sounds[`count${i}`].onerror = () => document.getElementById('debug').innerText += " Fout: " + name;
            }
        }
        loadAll();

        function startApp(skip) {
            document.getElementById('menu').style.display = 'none';
            
            // CRUCIAAL VOOR SMARTPHONE: Alle geluiden 'aanraken'
            Object.values(sounds).forEach(s => {
                s.play().then(() => { s.pause(); s.currentTime = 0; }).catch(e => {});
            });

            let dur = 20;
            if (!skip) {
                sounds.intro.play().catch(e => document.getElementById('debug').innerText = "Song blokkeert");
                dur = 180;
            }
            
            document.getElementById('action').innerText = "WACHT";
            let timer = dur;
            let introInterval = setInterval(() => {
                document.getElementById('timer').innerText = timer;
                if (timer <= 0) {
                    clearInterval(introInterval);
                    beginCycle();
                }
                timer--;
            }, 1000);
        }

        function beginCycle() {
            document.body.style.backgroundColor = "green";
            document.body.style.color = "black";
            document.getElementById('action').innerText = "START";
            sounds.start.play();
            // Voor de test laten we hem nu even hier, als dit werkt voegen we de rest toe
        }
    </script>
</body>
</html>
