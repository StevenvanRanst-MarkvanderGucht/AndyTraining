<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Andy Training</title>
    <style>
        body { margin: 0; background-color: red; color: yellow; font-family: Arial, sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; overflow: hidden; text-align: center; }
        #action { font-size: 12vw; font-weight: bold; margin-bottom: 10px; }
        #timer { font-size: 25vw; font-weight: bold; }
        button { padding: 20px 30px; font-size: 20px; font-weight: bold; cursor: pointer; border: none; border-radius: 10px; background: white; color: red; margin: 10px; }
        #debug { position: absolute; bottom: 5px; font-size: 10px; color: white; }
    </style>
</head>
<body>
    <div id="action">ANDY TRAINING</div>
    <div id="timer">KIES START</div>
    <div id="menu">
        <button onclick="startApp(false)">START MET SONG</button>
        <button onclick="startApp(true)">SNELSTART (20s)</button>
    </div>
    <div id="debug"></div>

    <script>
        // Omdat de bestanden los staan in je lijst, laten we het pad leeg
        const sounds = {};
        
        function loadSounds() {
            const files = {
                intro: "naamloos.wav",
                start: "START.mp3",
                stop: "stop 0.555 sec.mp3",
                finish: "aftellen 1 naar 1.mp3"
            };

            for (let key in files) {
                sounds[key] = new Audio(files[key]);
                // Foutzoeker
                sounds[key].onerror = () => { 
                    document.getElementById('debug').innerText += " ! " + files[key];
                };
            }

            for (let i = 2; i <= 10; i++) {
                let fname = (i === 5) ? "aftellen5 naar 1.mp3" : `aftellen ${i} naar 1.mp3`;
                sounds[`count${i}`] = new Audio(fname);
                sounds[`count${i}`].onerror = () => {
                    document.getElementById('debug').innerText += " ! " + fname;
                };
            }
        }
        
        loadSounds();

        function startApp(skip) {
            document.getElementById('menu').style.display = 'none';
            
            // Audio unlock voor smartphones
            Object.values(sounds).forEach(s => {
                s.play().then(() => { s.pause(); s.currentTime = 0; }).catch(() => {});
            });

            let waitTime = 20; // Snelstart
            if (!skip) {
                sounds.intro.play();
                waitTime = 180; // Song
            }

            document.getElementById('action').innerText = "WACHT";
            let remaining = waitTime;

            const countdown = setInterval(() => {
                document.getElementById('timer').innerText = remaining;
                if (remaining <= 0) {
                    clearInterval(countdown);
                    beginTraining();
                }
                remaining--;
            }, 1000);
        }

        function beginTraining() {
            document.body.style.backgroundColor = "green";
            document.body.style.color = "black";
            document.getElementById('action').innerText = "START";
            sounds.start.play();
            // Voor nu laten we hem hier; als dit geluid geeft, vullen we de rest aan
        }
    </script>
</body>
</html>
