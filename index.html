<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Andy Training</title>
    <style>
        body { margin: 0; background-color: red; color: yellow; font-family: Arial, sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; overflow: hidden; text-align: center; }
        #action { font-size: 12vw; font-weight: bold; }
        #timer { font-size: 25vw; font-weight: bold; }
        button { padding: 25px 35px; font-size: 22px; font-weight: bold; cursor: pointer; border: none; border-radius: 15px; background: white; color: red; margin: 15px; }
        #debug { position: absolute; bottom: 5px; font-size: 10px; color: white; width: 90%; }
    </style>
</head>
<body>
    <div id="action">ANDY TRAINING</div>
    <div id="timer">KIES START</div>
    <div id="menu">
        <button onclick="startApp(false)">START MET SONG</button>
        <button onclick="startApp(true)">SNELSTART (20s)</button>
    </div>
    <div id="debug"></div>

    <script>
        // We zoeken nu ALTIJD in de map 'audio/'
        const audioPath = "audio/";
        const sounds = {};
        
        const files = {
            intro: "naamloos.wav",
            start: "START.mp3",
            stop: "stop 0.555 sec.mp3",
            finish: "aftellen 1 naar 1.mp3"
        };

        function loadSounds() {
            for (let key in files) {
                sounds[key] = new Audio(audioPath + files[key]);
                sounds[key].onerror = () => { 
                    document.getElementById('debug').innerText += " ! " + files[key];
                };
            }
            for (let i = 2; i <= 10; i++) {
                let fname = (i === 5) ? "aftellen5 naar 1.mp3" : `aftellen ${i} naar 1.mp3`;
                sounds[`count${i}`] = new Audio(audioPath + fname);
                sounds[`count${i}`].onerror = () => {
                    document.getElementById('debug').innerText += " ! " + fname;
                };
            }
        }
        
        loadSounds();

        function startApp(skip) {
            document.getElementById('menu').style.display = 'none';
            
            // Audio 'wakker maken' voor smartphone
            Object.values(sounds).forEach(s => {
                s.play().then(() => { s.pause(); s.currentTime = 0; }).catch(() => {});
            });

            let waitTime = skip ? 20 : 180;
            if (!skip) {
                sounds.intro.play().catch(() => { document.getElementById('debug').innerText = "Audio geblokkeerd door browser"; });
            }

            document.getElementById('action').innerText = "WACHT";
            let remaining = waitTime;

            const countdown = setInterval(() => {
                document.getElementById('timer').innerText = remaining;
                if (remaining <= 0) {
                    clearInterval(countdown);
                    beginTraining();
                }
                remaining--;
            }, 1000);
        }

        function beginTraining() {
            document.body.style.backgroundColor = "green";
            document.body.style.color = "black";
            document.getElementById('action').innerText = "START";
            sounds.start.play();
        }
    </script>
</body>
</html>
